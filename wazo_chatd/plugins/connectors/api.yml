paths:
  /users/{user_uuid}/identities:
    get:
      operationId: list_user_identities
      summary: List user identities
      description: '**Required ACL:** `chatd.users.{user_uuid}.identities.read`'
      tags:
      - identities
      parameters:
      - $ref: '#/parameters/tenant_uuid'
      - $ref: '#/parameters/user_uuid'
      responses:
        '200':
          description: Identity list
          schema:
            $ref: '#/definitions/UserIdentityList'
    post:
      operationId: create_user_identity
      summary: Create user identity
      description: |
        **Required ACL:** `chatd.users.{user_uuid}.identities.create`

        Creates an external identity for the user on a configured backend.
      tags:
      - identities
      parameters:
      - $ref: '#/parameters/tenant_uuid'
      - $ref: '#/parameters/user_uuid'
      - name: body
        in: body
        required: true
        schema:
          $ref: '#/definitions/UserIdentityRequest'
      responses:
        '201':
          description: Identity created
          schema:
            $ref: '#/definitions/UserIdentity'
        '400':
          $ref: '#/responses/InvalidRequest'
        '404':
          $ref: '#/responses/NotFoundError'
        '409':
          description: An identity with the same backend/type/identity already exists
        '503':
          $ref: '#/responses/AnotherServiceUnavailable'
  /users/{user_uuid}/identities/{identity_uuid}:
    get:
      operationId: get_user_identity
      summary: Get user identity
      description: '**Required ACL:** `chatd.users.{user_uuid}.identities.{identity_uuid}.read`'
      tags:
      - identities
      parameters:
      - $ref: '#/parameters/tenant_uuid'
      - $ref: '#/parameters/user_uuid'
      - $ref: '#/parameters/identity_uuid'
      responses:
        '200':
          description: Identity
          schema:
            $ref: '#/definitions/UserIdentity'
        '404':
          $ref: '#/responses/NotFoundError'
    put:
      operationId: update_user_identity
      summary: Update user identity
      description: |
        **Required ACL:** `chatd.users.{user_uuid}.identities.{identity_uuid}.update`

        Updates the external identity value (e.g. on number reassignment).
      tags:
      - identities
      parameters:
      - $ref: '#/parameters/tenant_uuid'
      - $ref: '#/parameters/user_uuid'
      - $ref: '#/parameters/identity_uuid'
      - name: body
        in: body
        required: true
        schema:
          $ref: '#/definitions/UserIdentityUpdateRequest'
      responses:
        '200':
          description: Identity updated
          schema:
            $ref: '#/definitions/UserIdentity'
        '400':
          $ref: '#/responses/InvalidRequest'
        '404':
          $ref: '#/responses/NotFoundError'
        '409':
          description: Another identity with the same value already exists
    delete:
      operationId: delete_user_identity
      summary: Delete user identity
      description: '**Required ACL:** `chatd.users.{user_uuid}.identities.{identity_uuid}.delete`'
      tags:
      - identities
      parameters:
      - $ref: '#/parameters/tenant_uuid'
      - $ref: '#/parameters/user_uuid'
      - $ref: '#/parameters/identity_uuid'
      responses:
        '204':
          $ref: '#/responses/ResourceDeleted'
        '404':
          $ref: '#/responses/NotFoundError'
  /users/me/identities:
    get:
      operationId: list_user_me_identities
      summary: List identities for the authenticated user
      description: |
        **Required ACL:** `chatd.users.me.identities.read`

        Returns all identities of the authenticated user. When a
        `room_uuid` is provided, returns only identities usable to
        reach the other participants of that room.
      tags:
      - identities
      parameters:
      - name: room_uuid
        in: query
        type: string
        format: uuid
        required: false
        description: Filter identities by reachability for a specific room
      responses:
        '200':
          description: Identity list
          schema:
            $ref: '#/definitions/UserIdentityList'
        '400':
          $ref: '#/responses/InvalidRequest'
        '404':
          $ref: '#/responses/NotFoundError'
  /connectors/incoming:
    post:
      operationId: connector_webhook
      summary: Receive incoming webhook from connector
      description: |
        Dispatches an incoming webhook to the matching connector backend.

        **Body size**: capped at 4 MB at the nginx layer. Bodies above
        the cap are rejected with HTTP 413 before reaching chatd.
      tags:
      - connectors
      security: []
      consumes:
      - application/json
      - application/x-www-form-urlencoded
      parameters:
      - name: body
        in: body
        required: true
        schema:
          type: object
      responses:
        '204':
          description: Webhook accepted
        '400':
          description: No connector matched the webhook payload
          schema:
            $ref: '#/definitions/APIError'
        '401':
          description: Webhook signature verification failed
          schema:
            $ref: '#/definitions/APIError'
        '503':
          description: Webhook deferred; provider should retry
          schema:
            $ref: '#/definitions/APIError'
  /connectors/incoming/{backend}:
    post:
      operationId: connector_webhook_with_hint
      summary: Receive incoming webhook with backend hint
      description: Dispatches an incoming webhook, trying the specified backend first.
      tags:
      - connectors
      security: []
      consumes:
      - application/json
      - application/x-www-form-urlencoded
      parameters:
      - name: backend
        in: path
        type: string
        description: Backend name hint for faster dispatch
        required: true
      - name: body
        in: body
        required: true
        schema:
          type: object
      responses:
        '204':
          description: Webhook accepted
        '400':
          description: No connector matched the webhook payload
          schema:
            $ref: '#/definitions/APIError'
        '401':
          description: Webhook signature verification failed
          schema:
            $ref: '#/definitions/APIError'
        '503':
          description: Webhook deferred; provider should retry
          schema:
            $ref: '#/definitions/APIError'

parameters:
  identity_uuid:
    name: identity_uuid
    in: path
    type: string
    format: uuid
    description: The UUID of the identity
    required: true

definitions:
  UserIdentityList:
    title: UserIdentityList
    properties:
      items:
        type: array
        items:
          $ref: '#/definitions/UserIdentity'
      total:
        type: integer
        description: The number of results

  UserIdentity:
    title: UserIdentity
    properties:
      uuid:
        type: string
        description: The UUID of the identity
        readOnly: true
      backend:
        type: string
        description: The connector backend name
      type:
        type: string
        description: The messaging type
      identity:
        type: string
        description: The external identity value
      extra:
        type: object
        description: Additional metadata

  UserIdentityRequest:
    title: UserIdentityRequest
    properties:
      backend:
        type: string
        description: The connector backend name
      type:
        type: string
        description: The messaging type
      identity:
        type: string
        description: The external identity value
      extra:
        type: object
        description: Additional metadata
    required:
      - backend
      - type
      - identity

  UserIdentityUpdateRequest:
    title: UserIdentityUpdateRequest
    properties:
      identity:
        type: string
        description: The external identity value
      extra:
        type: object
        description: Additional metadata
    required:
      - identity
